<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Eva English</title>
</head>
<body>
  <section id="inicio">
    <h1>Eva English</h1>
    <p>Meu app de repetição em inglês.</p>
    <button onclick="comecarTreino()">Começar treino</button>
  </section>

<section id="treino" style="display: none;">
  <h1>Treino</h1>

  <div id="contador">Frase 1 de 5</div>

  <div id="frase"></div>

  <label for="velocidade">Velocidade da voz:</label>

<input
  type="range"
  id="velocidade"
  min="0.5"
  max="1.5"
  step="0.1"
  value="0.85"
  oninput="atualizarVelocidade()"
>

  <p id="valorVelocidade">1.0x</p>

<button onclick="fraseAnterior()">Voltar frase</button>

<button onclick="ouvirFrase()">Ouvir frase</button>

<button onclick="proximaFrase()">Próxima frase</button>

</section>

  <script src="app.js"></script>
</body>
</html>
